# Build Docker image on GitHub (not on laptop / not on VPS) → push GHCR.
# VPS only pulls the ready image (low CPU/RAM on server).
#
# Triggers:
#   - push to main (tags :sha + :latest)
#   - push version tags v* (tags :v1.0.0 + :latest)
#   - manual workflow_dispatch

name: Docker image (GHCR)

on:
  push:
    branches: [main]
    tags: ['v*']
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/workflows/tests.yml'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Extra image tag (optional, e.g. v0.1.0-manual)'
        required: false
        default: ''

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build & push
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short
            type=ref,event=tag
            type=raw,value=${{ inputs.tag }},enable=${{ inputs.tag != '' }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Summary
        run: |
          {
            echo "## Image pushed"
            echo ""
            echo '```'
            echo "${{ steps.meta.outputs.tags }}"
            echo '```'
            echo ""
            echo "### Deploy on VPS (pull only — cheap)"
            echo '```bash'
            echo "bash ~/leadgeeks-ticket/scripts/deploy-from-ghcr.sh latest"
            echo "# or: bash ~/leadgeeks-ticket/scripts/deploy-from-ghcr.sh sha-<short>"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
