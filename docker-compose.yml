# Local / VPS-friendly single service (SQLite in volume)
# Podman: podman compose up -d --build
# Docker:  docker compose up -d --build

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: localhost/leadgeeks-ticket:local
    container_name: leadgeeks-ticket
    ports:
      - "8080:8080"
    environment:
      APP_NAME: "LeadGeeks IT"
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8080
      LOG_CHANNEL: stderr
      LOG_LEVEL: debug
      DB_CONNECTION: sqlite
      SESSION_DRIVER: database
      CACHE_STORE: database
      QUEUE_CONNECTION: database
      SEED_ON_START: "true"
      PORT: "8080"
    volumes:
      - ticket-data:/app/database
      - ticket-storage:/app/storage
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "php",
          "-r",
          "exit(@file_get_contents('http://127.0.0.1:8080/up') === false ? 1 : 0);",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

volumes:
  ticket-data:
  ticket-storage:
